<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Ekta Sethi Makeovers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Didact+Gothic&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4A0E4E;
      --secondary: #C9A84C;
      --light: #FDF5E6;
      --white: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Didact Gothic', sans-serif;
      background: linear-gradient(180deg, #E8D5A3 0%, #C9A84C 30%, #B89835 70%, #A08020 100%);
      min-height: 100vh;
    }
    .bg-sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: sparkleFloat 3s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes sparkleFloat {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      50% { opacity: 0.8; transform: translateY(-40px) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0); }
    }
    .header {
      text-align: center;
      padding: 40px 20px 20px;
      position: relative;
      z-index: 2;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 2.4rem;
      color: var(--primary);
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
      animation: titleBounce 1s ease;
    }
    @keyframes titleBounce {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .header .subtitle {
      color: var(--white);
      font-size: 1rem;
      margin-top: 6px;
      opacity: 0.9;
    }
    .header .divider {
      width: 60px;
      height: 3px;
      background: var(--primary);
      margin: 16px auto 0;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 8px 20px;
      border: 2px solid var(--primary);
      border-radius: 4px;
      transition: 0.3s ease;
    }
    .back-btn:hover {
      background: var(--primary);
      color: var(--white);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px 40px 60px;
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .gallery-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: var(--white);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: cardRise 0.6s ease both;
      cursor: pointer;
    }
    .gallery-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 16px 40px rgba(74,14,78,0.4);
    }
    @keyframes cardRise {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .gallery-card img {
      width: 100%;
      display: block;
      aspect-ratio: 3/4;
      object-fit: cover;
      object-position: center top;
      transition: 0.5s ease;
    }
    .gallery-card:hover img {
      transform: scale(1.1);
    }
    .gallery-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(74,14,78,0.4) 0%, transparent 50%);
      opacity: 0;
      transition: 0.3s ease;
      z-index: 1;
    }
    .gallery-card:hover::before {
      opacity: 1;
    }
    .gallery-card .label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: var(--white);
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1rem;
      z-index: 2;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.3s ease;
    }
    .gallery-card:hover .label {
      opacity: 1;
      transform: translateY(0);
    }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      animation: scaleUp 0.3s ease;
    }
    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: var(--white);
      font-size: 2.5rem;
      cursor: pointer;
      z-index: 2;
    }
    .lightbox-close:hover { opacity: 0.7; }
    .lightbox-prev, .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      color: var(--white);
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .lightbox-prev:hover, .lightbox-next:hover { background: var(--secondary); color: var(--primary); }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    @media (max-width: 768px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
      .header h1 { font-size: 1.6rem; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="bg-sparkles" id="sparkles"></div>

  <div class="header">
    <a href="index.html" class="back-btn">&#8592; Back to Website</a>
    <h1>Work Gallery</h1>
    <p class="subtitle">Ekta Sethi Makeovers</p>
    <div class="divider"></div>
  </div>

  <div class="gallery-grid" id="gallery-grid">
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <button class="lightbox-prev" id="lightbox-prev">&#10094;</button>
    <img class="lightbox-img" id="lightbox-img" alt="Full View">
    <button class="lightbox-next" id="lightbox-next">&#10095;</button>
  </div>

  <script>
    const images = [
      { src: 'assets/images/IMG_0082.jpg', label: 'Look 1' },
      { src: 'assets/images/bridal-6.jpg', label: 'Bridal Look' },
      { src: 'assets/images/IMG_0088.jpg', label: 'Look 2' },
      { src: 'assets/images/IMG_0090.jpg', label: 'Look 3' },
      { src: 'assets/images/IMG_0091.jpg', label: 'Look 4' },
      { src: 'assets/images/IMG_0092.jpg', label: 'HD Makeup' },
      { src: 'assets/images/IMG_0093.jpg', label: 'Bridal Makeup' },
      { src: 'assets/images/IMG_0094.jpg', label: 'Engagement' },
      { src: 'assets/images/IMG_0095.jpg', label: 'Party Makeup' },
      { src: 'assets/images/IMG_0096.jpg', label: 'Airbrush' },
      { src: 'assets/images/IMG_0099.jpg', label: 'Hairstyling' },
      { src: 'assets/images/IMG_0100.jpg', label: 'Look 5' },
      { src: 'assets/images/IMG_0101.jpg', label: 'Look 6' },
      { src: 'assets/images/IMG_0106.jpg', label: 'Look 7' },
      { src: 'assets/images/bridal-2.jpg', label: 'Indian Bridal' },
      { src: 'assets/images/bridal-5.jpg', label: 'Bridal Look 2' },
      { src: 'assets/images/bridal-7.jpg', label: 'Bridal Look 3' },
      { src: 'assets/images/bridal-8.jpg', label: 'Bridal Look 4' },
      { src: 'assets/images/bridal-9.jpg', label: 'Bridal Look 5' },
      { src: 'assets/images/bridal-10.jpg', label: 'Bridal Look 6' },
      { src: 'assets/images/bridal-11.jpg', label: 'Bridal Look 7' },
      { src: 'assets/images/bridal-12.jpg', label: 'Bridal Look 8' },
      { src: 'assets/images/bridal-13.jpg', label: 'Bridal Look 9' },
      { src: 'assets/images/bridal-14.jpg', label: 'Bridal Look 10' }
    ];

    const grid = document.getElementById('gallery-grid');
    images.forEach(function(img, i) {
      const card = document.createElement('div');
      card.className = 'gallery-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.addEventListener('click', function() { openLightbox(i); });
      card.innerHTML = '<img src="' + img.src + '" alt="' + img.label + '" loading="lazy"><span class="label">' + img.label + '</span>';
      grid.appendChild(card);
    });

    // Sparkles
    const sparkleContainer = document.getElementById('sparkles');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 4 + 's';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      sparkleContainer.appendChild(s);
    }

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentIndex = 0;

    function openLightbox(idx) {
      currentIndex = idx;
      lightboxImg.src = images[idx].src;
      lightbox.classList.add('active');
    }
    function closeLightbox() { lightbox.classList.remove('active'); }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', function() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      lightboxImg.src = images[currentIndex].src;
    });
    document.getElementById('lightbox-next').addEventListener('click', function() {
      currentIndex = (currentIndex + 1) % images.length;
      lightboxImg.src = images[currentIndex].src;
    });
    lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + images.length) % images.length; lightboxImg.src = images[currentIndex].src; }
      if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % images.length; lightboxImg.src = images[currentIndex].src; }
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
