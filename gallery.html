<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Ekta Sethi Makeovers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Didact+Gothic&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root {
      --primary: #4A0E4E;
      --secondary: #C9A84C;
      --light: #FDF5E6;
      --white: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Didact Gothic', sans-serif;
      background: linear-gradient(180deg, #E8D5A3 0%, #C9A84C 30%, #B89835 70%, #A08020 100%);
      min-height: 100vh;
    }
    .bg-sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: sparkleFloat 3s ease-in-out infinite;
      opacity: 0;
    }
    @keyframes sparkleFloat {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      50% { opacity: 0.8; transform: translateY(-40px) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0); }
    }
    .light-sweep {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .light-sweep::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(201,168,76,0.04) 30deg, rgba(201,168,76,0.1) 60deg, rgba(201,168,76,0.04) 90deg, transparent 180deg, transparent 360deg);
      animation: lightSweep 20s linear infinite;
    }
    @keyframes lightSweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes kenBurns {
      from { transform: scale(1); }
      to { transform: scale(1.12); }
    }
    .header {
      text-align: center;
      padding: 40px 20px 20px;
      position: relative;
      z-index: 10;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 2.4rem;
      color: var(--primary);
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
      animation: titleBounce 1s ease;
    }
    /* Cinematic Video Section */
    .video-scroll-container {
      position: relative;
      width: 100%;
      height: 400vh; /* 4 viewport heights to make scrolling feel smooth */
      background: #000;
    }
    .video-sticky-wrapper {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .scroll-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
      transition: opacity 1s ease;
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, var(--primary) 100%);
      z-index: 2;
      pointer-events: none;
    }
    .video-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--secondary);
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      text-align: center;
      z-index: 3;
      opacity: 0;
      font-weight: 800;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px 40px 60px;
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .gallery-grid.visible-grid {
      opacity: 1;
      transform: translateY(0);
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 2.4rem;
      color: var(--primary);
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
      animation: titleBounce 1s ease;
    }
    @keyframes titleBounce {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .header .subtitle {
      color: var(--white);
      font-size: 1rem;
      margin-top: 6px;
      opacity: 0.9;
    }
    .header .divider {
      width: 60px;
      height: 3px;
      background: var(--primary);
      margin: 16px auto 0;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 10px;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 8px 20px;
      border: 2px solid var(--primary);
      border-radius: 4px;
      transition: 0.3s ease;
    }
    .back-btn:hover {
      background: var(--primary);
      color: var(--white);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px 40px 60px;
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .gallery-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: var(--white);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
      cursor: pointer;
    }
    .gallery-card.revealed {
      animation: cardRise 0.7s ease both;
    }
    .gallery-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 16px 40px rgba(74,14,78,0.4), 0 0 0 3px var(--secondary);
    }
    .gallery-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(201,168,76,0.6), transparent 50%, rgba(201,168,76,0.3), transparent 80%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 3;
      pointer-events: none;
    }
    .gallery-card:hover::after {
      opacity: 1;
    }
    .gallery-card .pulse-ring {
      position: absolute;
      inset: -4px;
      border-radius: 14px;
      border: 2px solid rgba(201,168,76,0.15);
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .gallery-card:hover .pulse-ring {
      opacity: 1;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { border-color: rgba(201,168,76,0.15); transform: scale(1); }
      50% { border-color: rgba(201,168,76,0.5); transform: scale(1.02); }
    }
    @keyframes cardRise {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .gallery-card img {
      width: 100%;
      display: block;
      aspect-ratio: 3/4;
      object-fit: cover;
      object-position: center top;
      transition: 0.5s ease;
    }
    .gallery-card:hover img {
      animation: kenBurns 8s ease forwards;
    }
    .gallery-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(74,14,78,0.4) 0%, transparent 50%);
      opacity: 0;
      transition: 0.3s ease;
      z-index: 1;
    }
    .gallery-card:hover::before {
      opacity: 1;
    }
    .gallery-card .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 16px 16px;
      background: linear-gradient(to top, rgba(74,14,78,0.85) 0%, transparent 100%);
      color: var(--secondary);
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.5px;
      z-index: 2;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .gallery-card:hover .label {
      opacity: 1;
      transform: translateY(0);
    }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      position: absolute;
      transition: opacity 0.35s ease;
    }
    .lightbox img.lb-active {
      opacity: 1;
    }
    .lightbox img.lb-hidden {
      opacity: 0;
    }
    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: var(--white);
      font-size: 2.5rem;
      cursor: pointer;
      z-index: 2;
    }
    .lightbox-close:hover { opacity: 0.7; }
    .lightbox-prev, .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      color: var(--white);
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .lightbox-prev:hover, .lightbox-next:hover { background: var(--secondary); color: var(--primary); }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    @media (max-width: 768px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
      .header h1 { font-size: 1.6rem; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="bg-sparkles" id="sparkles"></div>
  <div class="light-sweep"></div>

  <div class="header">
    <a href="index.html" class="back-btn">&#8592; Back to Website</a>
    <h1>Work Gallery</h1>
    <p class="subtitle">Ekta Sethi Makeovers</p>
    <div class="divider"></div>
  </div>

  <!-- Cinematic Scroll Video Section -->
  <div class="video-scroll-container" id="video-scroll">
    <div class="video-sticky-wrapper">
      <video class="scroll-video" id="scroll-video" muted playsinline preload="auto"
        poster="assets/images/bridal-6.jpg">
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
        <p>Your browser does not support the video element.</p>
      </video>
      <div class="video-overlay"></div>
      <div class="video-text" id="video-text">The Art of Makeup</div>
    </div>
  </div>

  <div class="gallery-grid" id="gallery-grid">
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <button class="lightbox-prev" id="lightbox-prev">&#10094;</button>
    <img class="lightbox-img" id="lightbox-img" alt="Full View">
    <button class="lightbox-next" id="lightbox-next">&#10095;</button>
  </div>

  <script>
    const images = [
      { src: 'assets/images/IMG_0082.jpg', label: 'Look 1' },
      { src: 'assets/images/bridal-6.jpg', label: 'Bridal Look' },
      { src: 'assets/images/IMG_0088.jpg', label: 'Look 2' },
      { src: 'assets/images/IMG_0090.jpg', label: 'Look 3' },
      { src: 'assets/images/IMG_0091.jpg', label: 'Look 4' },
      { src: 'assets/images/IMG_0092.jpg', label: 'HD Makeup' },
      { src: 'assets/images/IMG_0093.jpg', label: 'Bridal Makeup' },
      { src: 'assets/images/IMG_0094.jpg', label: 'Engagement' },
      { src: 'assets/images/IMG_0095.jpg', label: 'Party Makeup' },
      { src: 'assets/images/IMG_0096.jpg', label: 'Airbrush' },
      { src: 'assets/images/IMG_0099.jpg', label: 'Hairstyling' },
      { src: 'assets/images/IMG_0106.jpg', label: 'Look 5' },
      { src: 'assets/images/bridal-2.jpg', label: 'Indian Bridal' },
      { src: 'assets/images/bridal-5.jpg', label: 'Bridal Look 2' },
      { src: 'assets/images/bridal-7.jpg', label: 'Bridal Look 3' },
      { src: 'assets/images/bridal-8.jpg', label: 'Bridal Look 4' },
      { src: 'assets/images/bridal-9.jpg', label: 'Bridal Look 5' },
      { src: 'assets/images/bridal-10.jpg', label: 'Bridal Look 6' },
      { src: 'assets/images/bridal-11.jpg', label: 'Bridal Look 7' },
      { src: 'assets/images/bridal-12.jpg', label: 'Bridal Look 8' },
      { src: 'assets/images/bridal-13.jpg', label: 'Bridal Look 9' },
      { src: 'assets/images/bridal-14.jpg', label: 'Bridal Look 10' }
    ];

    const grid = document.getElementById('gallery-grid');
    images.forEach(function(img, i) {
      const card = document.createElement('div');
      card.className = 'gallery-card';
      card.addEventListener('click', function() { openLightbox(i); });
      card.innerHTML = '<div class="pulse-ring"></div><img src="' + img.src + '" alt="' + img.label + '" loading="lazy"><span class="label">' + img.label + '</span>';
      grid.appendChild(card);
    });

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -30px 0px' });

    var cards = document.querySelectorAll('.gallery-card');
    cards.forEach(function(card, i) {
      card.style.animationDelay = (i * 0.05) + 's';
      observer.observe(card);
    });

    // Lightbox with crossfade
    const lightbox = document.getElementById('lightbox');
    const lightboxContainer = lightbox;
    let currentIndex = 0;
    let imgA = null;
    let imgB = null;
    let showingA = true;

    function createLbImg() {
      var img = document.createElement('img');
      img.className = 'lb-hidden';
      img.style.position = 'absolute';
      img.style.maxWidth = '90vw';
      img.style.maxHeight = '90vh';
      img.style.objectFit = 'contain';
      img.style.borderRadius = '4px';
      img.style.transition = 'opacity 0.35s ease';
      lightboxContainer.appendChild(img);
      return img;
    }

    function openLightbox(idx) {
      currentIndex = idx;
      if (!imgA) {
        imgA = createLbImg();
        imgB = createLbImg();
      }
      imgA.src = images[idx].src;
      imgA.classList.remove('lb-hidden');
      imgA.classList.add('lb-active');
      imgB.classList.remove('lb-active');
      imgB.classList.add('lb-hidden');
      showingA = true;
      lightbox.classList.add('active');
    }

    function crossfadeTo(idx) {
      currentIndex = idx;
      var from = showingA ? imgA : imgB;
      var to = showingA ? imgB : imgA;
      to.src = images[idx].src;
      to.classList.remove('lb-hidden');
      to.classList.add('lb-active');
      from.classList.remove('lb-active');
      from.classList.add('lb-hidden');
      showingA = !showingA;
    }

    function closeLightbox() { lightbox.classList.remove('active'); }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', function() {
      crossfadeTo((currentIndex - 1 + images.length) % images.length);
    });
    document.getElementById('lightbox-next').addEventListener('click', function() {
      crossfadeTo((currentIndex + 1) % images.length);
    });
    lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowLeft') crossfadeTo((currentIndex - 1 + images.length) % images.length);
      if (e.key === 'ArrowRight') crossfadeTo((currentIndex + 1) % images.length);
      if (e.key === 'Escape') closeLightbox();
    });

    // Cinematic Scroll Video
    gsap.registerPlugin(ScrollTrigger);

    var video = document.getElementById('scroll-video');
    var videoContainer = document.getElementById('video-scroll');
    var galleryGrid = document.querySelector('.gallery-grid');
    var videoText = document.getElementById('video-text');

    video.addEventListener('loadedmetadata', function() {
      gsap.to(video, {
        currentTime: video.duration,
        ease: 'none',
        scrollTrigger: {
          trigger: videoContainer,
          start: 'top top',
          end: 'bottom bottom',
          scrub: 0.5,
          onEnter: function() { video.style.opacity = '1'; },
          onLeaveBack: function() { video.style.opacity = '0'; }
        }
      });

      gsap.fromTo(videoText,
        { opacity: 0, y: 30 },
        {
          opacity: 1,
          y: -30,
          duration: 0.8,
          scrollTrigger: {
            trigger: videoContainer,
            start: 'top top',
            end: 'bottom bottom',
            scrub: 0.5
          }
        }
      );

      gsap.to(galleryGrid, {
        opacity: 1,
        y: 0,
        duration: 0.1,
        scrollTrigger: {
          trigger: galleryGrid,
          start: 'top 90%',
          toggleActions: 'play none none reverse'
        }
      });
    });
  </script>
</body>
</html>
