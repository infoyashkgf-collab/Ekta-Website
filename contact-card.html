  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Didact+Gothic&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4A0E4E;
      --secondary: #C9A84C;
      --accent: #6B0F1A;
      --light: #FDF5E6;
      --white: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Didact Gothic', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 50px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeUp 0.6s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--secondary);
      object-fit: cover;
      margin-bottom: 24px;
      animation: glow 2.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 15px rgba(201,168,76,0.5); }
      50% { box-shadow: 0 0 30px rgba(201,168,76,0.8); }
    }
    .card h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--secondary);
      margin-bottom: 4px;
    }
    .card .tagline {
      color: var(--primary);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
    .card hr {
      border: none;
      height: 2px;
      background: var(--secondary);
      width: 50px;
      margin: 0 auto 30px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-radius: 8px;
      background: var(--light);
      text-decoration: none;
      color: var(--primary);
      font-size: 1.05rem;
      transition: 0.3s ease;
      border: 1px solid transparent;
    }
    .info-item:hover {
      border-color: var(--secondary);
      background: var(--white);
      transform: translateY(-2px);
    }
    .info-item svg {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
    }
    .info-item strong {
      display: block;
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: var(--secondary);
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
